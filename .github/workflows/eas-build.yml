name: EAS Build

# Queues an EAS build on Expo servers (free tier = low-priority queue).
# Uses --no-wait so this job finishes quickly; track builds on expo.dev.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: development
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Queue EAS build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve build inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ github.event.inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "platform=android" >> "$GITHUB_OUTPUT"
          fi

      - name: Queue EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli build \
            --profile "${{ steps.inputs.outputs.profile }}" \
            --platform "${{ steps.inputs.outputs.platform }}" \
            --non-interactive \
            --no-wait

      - name: Build dashboard
        run: |
          echo "Track build: https://expo.dev/accounts/ahmed5145/projects/returnrider/builds"
