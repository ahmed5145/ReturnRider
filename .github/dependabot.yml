# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Monorepo root — workspaces include apps/api (package-lock.json at repo root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - api

  # Mobile is not an npm workspace — separate lockfile in apps/mobile
  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - mobile

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
