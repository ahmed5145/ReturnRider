# ReturnRider API — Render.com staging/production
# Docs: docs/STAGING_DEPLOY.md
services:
  - type: web
    name: returnrider-api
    runtime: node
    region: ohio
    plan: free
    rootDir: .
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build -w @returnrider/api
    startCommand: npm run start -w @returnrider/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: ALLOW_DEV_AUTH
        value: "true"
      - key: PORT
        value: 10000

  # Pings /health every 14 min so the free web service + BullMQ workers stay awake.
  # Enable in Render dashboard after deploy, or use UptimeRobot (see docs/STAGING_DEPLOY.md).
  - type: cron
    name: api-keep-warm
    runtime: image
    schedule: "*/14 * * * *"
    image:
      url: docker.io/curlimages/curl:latest
    dockerCommand: curl -fsS https://returnrider-api.onrender.com/health
